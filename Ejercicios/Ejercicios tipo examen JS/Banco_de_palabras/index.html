<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
  <input type="text" id="word-input" placeholder="Introduce una palabra">
  <button id="add-btn">Añadir</button>
  <p id="error-msg" style="color:red"></p>
  <button id="sort-btn">Ordenar A-Z</button>
  <button id="dup-btn">Buscar duplicados</button>
  <p>Total palabras: <span id="word-count">0</span></p>
  <ul id="word-list"></ul>
</div>
<script src="app.js"></script>
</body>
</html>
