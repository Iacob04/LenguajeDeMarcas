<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
  <input type="number" id="importe" placeholder="Importe de la cuenta (€)" min="0" step="0.01">
  <p id="error-msg" style="color:red"></p>
  <button id="btn-10">Propina 10%</button>
  <button id="btn-15">Propina 15%</button>
  <button id="btn-20">Propina 20%</button>
  <button id="btn-clear">Limpiar</button>
  <p>Propina: <span id="propina">—</span></p>
  <p>Total a pagar: <span id="total">—</span></p>
</div>
<script src="app.js"></script>
</body>
</html>
