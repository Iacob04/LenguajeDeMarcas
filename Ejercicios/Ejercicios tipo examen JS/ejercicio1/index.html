<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito de la compra</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { font-size: 22px; margin-bottom: 20px; }
        input {
            padding: 8px;
            margin-right: 6px;
            margin-bottom: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            padding: 8px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            background: white;
        }
        button:hover { background: #f0f0f0; }
        #error-msg { color: red; font-size: 13px; min-height: 18px; }
        ul { list-style: none; padding: 0; margin: 14px 0; }
        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        li button {
            font-size: 12px;
            padding: 4px 10px;
            color: #c00;
            border-color: #c00;
        }
        #total-line {
            font-size: 16px;
            font-weight: bold;
            border-top: 1px solid #ccc;
            padding-top: 10px;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<h1>Carrito de la compra</h1>

<div>
    <input type="text" id="product-name" placeholder="Nombre del producto">
    <input type="number" id="product-price" placeholder="Precio (€)" min="0" step="0.01" style="width:110px">
    <button id="add-btn">Añadir</button>
</div>

<p id="error-msg"></p>

<ul id="product-list"></ul>

<p id="total-line">Total: <span id="total">0.00</span>€</p>

<script src="app.js"></script>
</body>
</html>
